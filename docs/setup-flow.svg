<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Setup Models for OpenClaw with clawd-models</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#666">Interactive TUI (Text User Interface)</text>

  <!-- Step 1: Install OpenClaw -->
  <rect x="20" y="70" width="150" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">1. Install &amp;</text>
  <text x="95" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Init OpenClaw</text>
  <text x="95" y="133" text-anchor="middle" font-size="9" fill="#555">npm i -g openclaw@latest</text>

  <!-- Arrow 1 -->
  <path d="M175 100 L210 100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Install clawd-models -->
  <rect x="220" y="70" width="150" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="295" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">2. Install</text>
  <text x="295" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">clawd-models</text>
  <text x="295" y="128" text-anchor="middle" font-size="9" fill="#555">npm i -g clawd-models</text>

  <!-- Arrow 2 -->
  <path d="M375 100 L410 100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Run TUI -->
  <rect x="420" y="70" width="150" height="55" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57c00">3. Run TUI</text>
  <text x="495" y="115" text-anchor="middle" font-size="10" fill="#555">clawd-models</text>
  <text x="495" y="128" text-anchor="middle" font-size="9" fill="#555">(starts automatically)</text>

  <!-- Arrow 3 -->
  <path d="M575 100 L610 100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: TUI Menu -->
  <rect x="620" y="70" width="150" height="55" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="695" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57c00">4. Interactive</text>
  <text x="695" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57c00">Menu</text>
  <text x="695" y="125" text-anchor="middle" font-size="9" fill="#555">Arrow keys + Enter</text>

  <!-- TUI Flow -->
  <rect x="220" y="190" width="360" height="120" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="400" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">TUI Main Menu</text>

  <!-- Menu Items -->
  <rect x="235" y="220" width="105" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="287" y="235" text-anchor="middle" font-size="9" fill="#1976d2">📋 Providers</text>

  <rect x="350" y="220" width="95" height="22" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="397" y="235" text-anchor="middle" font-size="9" fill="#388e3c">🤖 Models</text>

  <rect x="455" y="220" width="100" height="22" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="505" y="235" text-anchor="middle" font-size="9" fill="#f57c00">👥 Agents</text>

  <rect x="280" y="250" width="110" height="22" rx="4" fill="#fce4ec" stroke="#c2185b" stroke-width="1"/>
  <text x="335" y="265" text-anchor="middle" font-size="9" fill="#c2185b">🔧 Test API</text>

  <rect x="400" y="250" width="90" height="22" rx="4" fill="#e0e0e0" stroke="#666" stroke-width="1"/>
  <text x="445" y="265" text-anchor="middle" font-size="9" fill="#666">📊 View Config</text>

  <rect x="280" y="278" width="80" height="22" rx="4" fill="#e0e0e0" stroke="#666" stroke-width="1"/>
  <text x="320" y="293" text-anchor="middle" font-size="9" fill="#666">💾 Save</text>

  <!-- Arrow from Step 4 to TUI Flow -->
  <path d="M695 125 L695 160 L400 160 L400 190" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>

  <!-- OpenClaw Usage -->
  <rect x="600" y="220" width="180" height="80" rx="8" fill="#fafafa" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="690" y="240" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Then use OpenClaw</text>
  <text x="690" y="255" text-anchor="middle" font-size="8" fill="#555">openclaw agent -m "hi"</text>
  <text x="690" y="268" text-anchor="middle" font-size="8" fill="#555">openclaw models list</text>
  <text x="690" y="281" text-anchor="middle" font-size="8" fill="#555">openclaw configure</text>

  <!-- Legend -->
  <rect x="20" y="330" width="100" height="55" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="70" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Legend</text>
  <circle cx="35" cy="365" r="5" fill="#1976d2"/>
  <text x="48" y="369" font-size="8" fill="#555" text-anchor="start">OpenClaw</text>
  <circle cx="35" cy="378" r="5" fill="#f57c00"/>
  <text x="48" y="382" font-size="8" fill="#555" text-anchor="start">TUI</text>

  <!-- Note about non-interactive mode -->
  <rect x="130" y="330" width="220" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="240" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">Non-Interactive Mode</text>
  <text x="240" y="362" text-anchor="middle" font-size="8" fill="#555">Ctrl+C or close terminal to exit</text>
  <text x="240" y="376" text-anchor="middle" font-size="8" fill="#555">Config auto-saved to ~/.openclaw/</text>
</svg>